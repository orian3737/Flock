services:
  - type: web
    name: flock-api
    runtime: python
    rootDir: farmbright/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: https://orian3737.github.io
